      ### Custom Prompt Templates for Gemini CLI

      ---

      These templates are designed to help you formulate clear, structured requests, ensuring I can provide the most accurate and actionable insights from your Neo4j graph. Using these will streamline our collaboration and maximize the value of each interaction.

      #### **Template 1: Targeted Graph Query**

      Use this when you want to retrieve specific nodes, relationships, or paths based on defined criteria.

      ```markdown
      **REQUEST TYPE:** Targeted Graph Query

      **OBJECTIVE:** [Clearly state what you want to find or understand. E.g., "Identify all operators that influence a specific invariant."]

      **TARGET NODES/RELATIONSHIPS:**
      - **Labels:** [e.g., "Operator", "Invariant", "PotentialWell"]
      - **Properties:** [e.g., "name: 'ObserverCore'", "potential_type: 'Positive Emergence'"]
      - **Relationships:** [e.g., "EMERGES_FROM", "ACTIVATES_POTENTIAL"]

      **CRITERIA/FILTERS:**
      - [Specify any conditions. E.g., "Nodes with more than 10 outgoing relationships."]
      - [Specify path length, direction, or specific relationship types to traverse.]

      **OUTPUT REQUIREMENTS:**
      - **Format:** [e.g., "Markdown table", "YAML", "List of node names"]
      - **Fields to Return:** [e.g., "Node name", "Node labels", "Relationship type", "Connected node name", "Specific properties like 'definition'"]
      - **Limit:** [e.g., "Top 20 results", "All results"]
      - **Save to File:** [e.g., "D:\neo4j\neo4j_exploration\my_query_results.md"]
      ```

      #### **Template 2: Report Generation Request**

      Use this when you need a summary, analysis, or synthesis of graph data based on multiple criteria, similar to our previous reports.

      ```markdown
      **REQUEST TYPE:** Report Generation

      **OBJECTIVE:** [Clearly state the purpose of the report. E.g., "Summarize the impact of specific operators on system stability."]

      **REPORT COMPONENTS:**
      1.  [Specify the first piece of information. E.g., "List all operators that are duals of 'ObserverCore'."]
      2.  [Specify the second piece of information. E.g., "For each dual, show its incoming and outgoing relationship types."]
      3.  [Add any other required sections or analyses.]

      **CRITERIA/FILTERS:**
      - [Specify any conditions for inclusion in the report. E.g., "Only include operators with a leverage ratio > 5."]
      - [Reference previous reports if applicable. E.g., "Use data from 'emergence_patterns.md'."]

      **OUTPUT REQUIREMENTS:**
      - **Format:** [e.g., "Markdown document with sections and tables"]
      - **Key Insights:** [e.g., "Include a section for key insights and strategic implications."]
      - **Save to File:** [e.g., "D:\neo4j\neo4j_exploration\my_new_report.md"]
      ```

      #### **Template 3: Strategic Analysis & Guidance**

      Use this when you need meta-level analysis, strategic recommendations, or guidance on complex problems.

      ```markdown
      **REQUEST TYPE:** Strategic Analysis & Guidance

      **OBJECTIVE:** [Clearly state the strategic problem or question. E.g., "Develop a counter-strategy for adversarial influence campaigns."]

      **CONTEXT/ASSUMPTIONS:**
      - [Provide any relevant background, current state, or assumptions. E.g., "Assume the adversary uses 'Disinformation_Operator' nodes."]
      - [Reference specific reports or concepts. E.g., "Consider insights from 'hybrid_zones.md' and 'meta_operators.md'."]

      **SPECIFIC QUESTIONS/AREAS OF FOCUS:**
      - [e.g., "Identify potential vulnerabilities in our 'Information_Flow' network."]
      - [e.g., "Suggest new 'Operator's or 'RelationshipType's to mitigate disinformation."]
      - [e.g., "Propose a 'Stress Test' scenario for our 'Core_Conceptual_Operator'."]

      **OUTPUT REQUIREMENTS:**
      - **Format:** [e.g., "Structured Markdown analysis with recommendations"]
      - **Key Takeaways:** [e.g., "Provide actionable strategic recommendations."]
      - **Save to File:** [e.g., "D:\neo4j\neo4j_exploration\strategic_guidance.md"]
      ```
